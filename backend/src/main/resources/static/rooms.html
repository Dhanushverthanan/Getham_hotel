<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getham Hotel | Rooms</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><span class="logo-text">Getham<span
                        class="logo-accent">Hotel</span></span></a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="rooms.html" class="nav-link active">Rooms</a>
                <a href="login.html" class="nav-link" id="nav-login">Login</a>
                <a href="#" class="nav-link" id="nav-logout" style="display:none;" onclick="logout()">Logout</a>
            </nav>
        </div>
    </header>

    <section class="section rooms bg-light" style="padding-top: 150px;">
        <div class="container">
            <div class="section-header text-center">
                <p class="section-subtitle">Reserve Your Stay</p>
                <h2 class="section-title">Available Rooms</h2>
                <div style="margin-top: 20px;">
                    <input type="date" id="search-checkin" style="padding: 8px; margin-right: 10px;">
                    <input type="date" id="search-checkout" style="padding: 8px; margin-right: 10px;">
                    <button onclick="searchRooms()" class="btn btn-primary" style="padding: 8px 16px;">Search</button>
                </div>
            </div>
            <div class="grid rooms-grid" id="rooms-container">
                <!-- Rooms loaded via JS -->
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        async function loadRooms(checkIn, checkOut) {
            const container = document.getElementById('rooms-container');
            const API = "https://getham-hotel.onrender.com";
            let url = API + '/rooms';
            if (checkIn && checkOut) {
                url = API + '/rooms/available?checkIn=' + checkIn + '&checkOut=' + checkOut;
            }
            try {
                const res = await fetch(url);
                if (res.ok) {
                    const rooms = await res.json();
                    container.innerHTML = rooms.map(room => {
                        let img = 'images/room1.jpg';
                        if (room.type === 'Deluxe') img = 'images/room1.jpg';
                        else if (room.type === 'Suite') img = 'images/room2.jpg';
                        else if (room.type === 'Standard' || room.type === 'Villa') img = 'images/room3.jpg';

                        return `
                        <div class="card room-card">
                            <div class="card-img">
                               <img src="${img}" alt="${room.type}">
                             </div>
                            <div class="card-content">
                                <h3>Room ${room.number} (${room.type})</h3>
                                <p>Price: ₹${room.price} / night</p>
                                <p>Status: <strong style="color:${room.available ? 'green' : 'red'}">${room.available ? 'Available' : 'Booked'}</strong></p>
                                <div class="card-footer">
                                    ${room.available ? `<button onclick="bookRoom(${room.id}, ${room.price})" class="btn btn-outline btn-sm">Book</button>` : `<button class="btn btn-outline btn-sm" disabled style="opacity:0.5">Unavailable</button>`}
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('');
                }
            } catch (e) { console.error(e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadRooms();
        });

        function searchRooms() {
            const ci = document.getElementById('search-checkin').value;
            const co = document.getElementById('search-checkout').value;
            if(!ci || !co) { alert("Please select dates"); return; }
            localStorage.setItem('bookingCheckIn', ci);
            localStorage.setItem('bookingCheckOut', co);
            loadRooms(ci, co);
        }

        function bookRoom(id, price) {
            const token = localStorage.getItem('jwt');
            if (!token) {
                alert('Please login to book a room.');
                window.location.href = 'login.html';
                return;
            }
            localStorage.setItem('bookingRoomId', id);
            localStorage.setItem('bookingRoomPrice', price);
            window.location.href = 'booking.html';
        }
    </script>
</body>

</html>
