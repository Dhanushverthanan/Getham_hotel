<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getham Hotel | Admin Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            background-color: var(--color-bg-dark);
        }

        .auth-card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 20px;
            color: var(--color-bg-dark);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: var(--font-body);
        }

        .error-msg {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card" id="login-box">
            <h2>Admin Portal Access</h2>
            <div id="login-error" class="error-msg"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Passcode</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Secure Login</button>
            </form>
            <div style="margin-top: 15px;">
                <a href="index.html" style="font-size:14px; color:#555; text-decoration:none;">&larr; Return to Guest Site</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const API = "https://getham-hotel.onrender.com";

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    const data = await res.json();
                    if (data.role !== 'ADMIN') {
                        const err = document.getElementById('login-error');
                        err.innerText = "Access Denied: Administrator Privileges Required.";
                        err.style.display = 'block';
                        return;
                    }
                    localStorage.setItem('jwt', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('userId', data.id);
                    window.location.href = 'admin.html';
                } else {
                    const err = document.getElementById('login-error');
                    err.innerText = "Invalid credentials";
                    err.style.display = 'block';
                }
            } catch (e) { console.error(e); }
        });
    </script>
</body>

</html>
